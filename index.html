<!doctype html>
<html lang="en">
  <head>
    <!--===== Meta Tag =====-->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--===== Page Title =====-->
    <title>Profile Card</title>
    <!--===== CSS Link =====-->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--===== Card =====-->
    <div class="card">
      <!--===== Card Header =====-->
      <div class="card__header">
        <img src="Aman_.png" alt="Profile Image" class="card__image" />
      </div>
      <!--===== Card Body =====-->
      <div class="card__body">
        <h2 class="card__name">SK MOHAMMED AMAN</h2>
        <p class="card__role">Web Developer</p>
        <p class="card__description">
          Passionate about building clean and responsive web interfaces.
          Currently improving HTML, CSS, and JavaScript.
        </p>
        <button class="card__button card__button--primary">Contact Me</button>
      </div>
    </div>
  </body>
</html>
